<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#080808">
  <title>心语 · 心理健康访谈</title>
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <main class="app-shell">
    <header class="topbar">
      <div class="brand-mark" aria-hidden="true">心</div>
      <div class="brand-copy">
        <h1>心语访谈</h1>
        <p><span class="status-dot"></span>安全、私密的倾听空间</p>
      </div>
      <button id="resetBtn" class="ghost-button" type="button" hidden>重新选择</button>
    </header>

    <section id="chat" class="chat" aria-live="polite" aria-label="访谈对话">
      <section id="interviewerPicker" class="picker" aria-labelledby="pickerTitle">
        <p class="eyebrow">开始访谈</p>
        <h2 id="pickerTitle">选择一位访谈智能体</h2>
        <p class="picker-intro">请选择一位访谈智能体开始本次访谈。</p>
        <div class="agent-grid">
          <button class="agent-card" type="button" data-interviewer="general">
            <span class="agent-icon">A</span>
            <strong>访谈智能体 A</strong>
            <small>点击选择该访谈智能体并开始访谈。</small>
            <span class="choose-label">选择此方式 →</span>
          </button>
          <button class="agent-card" type="button" data-interviewer="dsm">
            <span class="agent-icon">B</span>
            <strong>访谈智能体 B</strong>
            <small>点击选择该访谈智能体并开始访谈。</small>
            <span class="choose-label">选择此方式 →</span>
          </button>
          <button class="agent-card" type="button" data-interviewer="mini">
            <span class="agent-icon">C</span>
            <strong>访谈智能体 C</strong>
            <small>点击选择该访谈智能体并开始访谈。</small>
            <span class="choose-label">选择此方式 →</span>
          </button>
        </div>
      </section>
    </section>

    <section class="composer-wrap">
      <div id="error" class="error" role="alert"></div>
      <form id="chatForm" class="composer">
        <textarea id="messageInput" rows="1" maxlength="4000" placeholder="请先选择访谈智能体" aria-label="输入消息" required disabled></textarea>
        <button id="sendBtn" class="send-button" type="submit" aria-label="发送消息" disabled>
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="m4 12 15-8-5 16-3-6-7-2Zm7 2 8-10"/></svg>
        </button>
      </form>
      <p class="notice">AI 访谈不能替代专业诊断或治疗。若你正处于紧急危险中，请立即联系当地急救服务或身边可信任的人。</p>
    </section>
  </main>
  <script src="/app.js?v=3" defer></script>
</body>
</html>
